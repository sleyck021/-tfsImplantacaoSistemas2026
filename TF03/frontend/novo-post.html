<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Post - Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📝 Blog Multi-Container</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="novo-post.html" class="btn-primary">Novo Post</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Criar Novo Post</h2>
            <form id="post-form" method="post" action="javascript:void(0);">
                <div class="form-group">
                    <label for="title">Título</label>
                    <input type="text" id="title" name="title" required>
                </div>
                
                <div class="form-group">
                    <label for="author">Autor</label>
                    <input type="text" id="author" name="author" required>
                </div>
                
                <div class="form-group">
                    <label for="content">Conteúdo</label>
                    <textarea id="content" name="content" rows="10" required></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Publicar Post</button>
                    <a href="index.html" class="btn-secondary">Cancelar</a>
                </div>
            </form>
            <div id="message" class="message"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>TF03 - Orquestação Multi-Serviços com Docker Compose</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('post-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;
            
            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, author, content })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('✅ Post publicado com sucesso!');
                    window.location.href = '/index.html';
                } else {
                    alert('❌ Erro: ' + (result.error || 'Erro ao publicar'));
                }
            } catch (error) {
                alert('❌ Erro ao publicar: ' + error.message);
            }
        });
    </script>
</body>
</html>
